name: frontened

description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  share_plus: ^13.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  open_file: ^3.3.2
  provider: ^6.1.2
  google_sign_in: ^6.2.1
  rename: ^3.1.0
  firebase_core: ^4.2.1
  syncfusion_flutter_pdfviewer: ^33.1.49
  permission_handler: ^12.0.1
  shimmer: ^3.0.0
  file_picker: ^8.0.6
  image_picker: ^1.0.7
  dio: ^5.4.0
  device_info_plus: ^12.4.0
  camera: ^0.12.0+1

  flutter_spinkit: ^5.2.1
  cloud_firestore: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/google.jpg
    - assets/images/logo.jpeg
    - assets/images/ic_launcher.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ic_launcher.png"
  min_sdk_android: 21

dependency_overrides:
  win32: ^5.11.0

